# ==============================================================================
# GIT-CLIFF VOLLSTÄNDIGE KONFIGURATION
# Alle verfügbaren TOML-Optionen mit Beschreibung
# ==============================================================================

# ------------------------------------------------------------------------------
# [changelog] - Changelog-Ausgabe Konfiguration
# ------------------------------------------------------------------------------
[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""                                                                               # Tera-Template: Header am Anfang des Changelogs

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**BREAKING**] {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
            {% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ commit.remote.pr_url }}){% endif %}
    {% endfor %}
{% endfor %}
"""                                                                               # Tera-Template: Body für jedes Release (PFLICHTFELD)

footer = """
<!-- generated by git-cliff -->
"""                                                                               # Tera-Template: Footer am Ende des Changelogs

trim = true                                                                       # Whitespace am Anfang/Ende trimmen
render_always = false                                                             # Body auch ohne Releases rendern
output = "CHANGELOG.md"                                                           # Ausgabe-Datei Pfad

postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/user/repo" },             # Regex-Ersetzung nach Template-Rendering
    { pattern = '<!-- (.+) -->', replace = "" },                                  # Weiterer Postprocessor
]

# ------------------------------------------------------------------------------
# [git] - Git/Commit Verarbeitung
# ------------------------------------------------------------------------------
[git]
conventional_commits = true                                                       # Conventional Commits Spezifikation parsen
require_conventional = false                                                      # Alle Commits müssen conventional sein
filter_unconventional = true                                                      # Nicht-conventional Commits ausschließen
split_commits = false                                                             # Mehrzeilige Messages als separate Commits
protect_breaking_commits = false                                                  # Breaking Changes nie skippen
filter_commits = false                                                            # Ungematchte Commits ausschließen
fail_on_unmatched_commit = false                                                  # Bei ungematchten Commits abbrechen
tag_pattern = "v[0-9].*"                                                          # Regex: Nur diese Tags sind Releases
skip_tags = ""                                                                    # Regex: Tags überspringen (ins nächste Release)
ignore_tags = ""                                                                  # Regex: Tags komplett ignorieren
count_tags = ""                                                                   # Regex: Tags für Zählung
use_branch_tags = false                                                           # Nur Tags des aktuellen Branches
topo_order = false                                                                # Releases topologisch statt chronologisch
topo_order_commits = true                                                         # Commits topologisch ordnen
sort_commits = "oldest"                                                           # Sortierung: "oldest" | "newest"
limit_commits = 0                                                                 # Max. Commits (0 = unbegrenzt)
recurse_submodules = false                                                        # Submodule-Commits einbeziehen
include_paths = []                                                                # Nur Commits mit Änderungen in diesen Pfaden
exclude_paths = []                                                                # Commits mit Änderungen hier ausschließen

commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },                          # Regex-Ersetzung VOR Verarbeitung
]

commit_parsers = [
    { message = "^feat", group = "Features" },                                    # feat: -> Features Gruppe
    { message = "^fix", group = "Bug Fixes" },                                    # fix: -> Bug Fixes Gruppe
    { message = "^doc", group = "Documentation" },                                # doc: -> Documentation Gruppe
    { message = "^perf", group = "Performance" },                                 # perf: -> Performance Gruppe
    { message = "^refactor", group = "Refactor" },                                # refactor: -> Refactor Gruppe
    { message = "^style", group = "Styling" },                                    # style: -> Styling Gruppe
    { message = "^test", group = "Testing" },                                     # test: -> Testing Gruppe
    { message = "^chore\\(release\\)", skip = true },                             # Release-Commits skippen
    { message = "^chore\\(deps.*\\)", skip = true },                              # Dependency-Updates skippen
    { message = "^chore|^ci", group = "Miscellaneous Tasks" },                    # chore/ci: -> Miscellaneous
    { body = ".*security", group = "Security" },                                  # Body mit "security" -> Security
]

link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/user/repo/issues/$1", text = "#$1" },           # Issue-Links
    { pattern = "RFC(\\d+)", href = "https://www.rfc-editor.org/rfc/rfc$1", text = "RFC$1" },         # RFC-Links
]

# ------------------------------------------------------------------------------
# [bump] - Version Bumping Konfiguration
# ------------------------------------------------------------------------------
[bump]
features_always_bump_minor = false                                                # Features immer Minor-Bump (auch bei 0.x)
breaking_always_bump_major = false                                                # Breaking immer Major-Bump (auch 0→1)
initial_tag = "0.1.0"                                                             # Initiale Version ohne existierende Tags
custom_major_increment_regex = ""                                                 # Custom Regex für Major-Bump
custom_minor_increment_regex = ""                                                 # Custom Regex für Minor-Bump
bump_type = ""                                                                    # Erzwinge: "major" | "minor" | "patch" | ""

# ------------------------------------------------------------------------------
# [remote.github] - GitHub Integration
# ------------------------------------------------------------------------------
[remote.github]
owner = ""                                                                        # Repository Owner (User/Organisation)
repo = ""                                                                         # Repository Name
token = ""                                                                        # API Token (besser: GITHUB_TOKEN env var)
api_url = ""                                                                      # Custom API URL (GitHub Enterprise)
native_tls = true                                                                 # Native TLS verwenden

